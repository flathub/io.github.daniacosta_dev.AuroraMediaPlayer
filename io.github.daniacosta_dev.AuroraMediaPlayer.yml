app-id: io.github.daniacosta_dev.AuroraMediaPlayer
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: aurora-media

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/doc
  - '*.la'
  - '*.a'

modules:

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=disabled
      - -Dd3d11=disabled
      - -Dglslang=disabled
      - -Dopengl=disabled
      - -Ddemos=false
      - -Dtests=false
    sources:
      - type: archive
        url: https://github.com/haasn/libplacebo/archive/refs/tags/v7.349.0.tar.gz
        sha256: 627e32439a0b3d2b90368ead7e919f470ee7446c87cc0f7841bbe319b23aa8b1

  - name: libass
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.3/libass-0.17.3.tar.gz
        sha256: da7c348deb6fa6c24507afab2dee7545ba5dd5bbf90a137bfe9e738f7df68537

  - name: luajit
    buildsystem: simple
    build-commands:
      - make PREFIX=/app
      - make install PREFIX=/app
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: git
        url: https://github.com/LuaJIT/LuaJIT.git
        disable-shallow-clone: true
        commit: 659a61693aa3b87661864ad0f12eee14c865cd7f

  - name: libmpv
    buildsystem: meson
    build-options:
      env:
        PKG_CONFIG_PATH: /app/lib/pkgconfig:/app/share/pkgconfig
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dbuild-date=false
      - -Dtests=false
      - -Dalsa=disabled
      - -Dmanpage-build=disabled
      - -Dlua=enabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.38.0.tar.gz
        sha256: 86d9ef40b6058732f67b46d0bbda24a074fae860b3eaae05bab3145041303066

  - name: yt-dlp
    buildsystem: simple
    build-commands:
      - install -Dm755 yt-dlp /app/bin/yt-dlp
    sources:
      - type: file
        url: https://github.com/yt-dlp/yt-dlp/releases/download/2026.03.17/yt-dlp
        sha256: 3bda0968a01cde70d26720653003b28553c71be14dcb2e5f4c24e9921fdad745
        dest-filename: yt-dlp
        x-checker-data:
          type: json
          url: https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest
          version-query: .tag_name
          url-query: .assets[] | select(.name == "yt-dlp") | .browser_download_url

  - name: aurora-media-player
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/aurora-media-player/cargo
        RUSTFLAGS: -L /app/lib
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --manifest-path Cargo.toml
      - install -Dm755 target/release/aurora-media /app/bin/aurora-media
      - install -Dm644 data/io.github.daniacosta_dev.AuroraMediaPlayer.desktop /app/share/applications/io.github.daniacosta_dev.AuroraMediaPlayer.desktop
      - install -Dm644 data/io.github.daniacosta_dev.AuroraMediaPlayer.metainfo.xml
        /app/share/metainfo/io.github.daniacosta_dev.AuroraMediaPlayer.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/io.github.daniacosta_dev.AuroraMediaPlayer.svg
        /app/share/icons/hicolor/scalable/apps/io.github.daniacosta_dev.AuroraMediaPlayer.svg
    sources:
      - type: git
        url: https://github.com/daniacosta-dev/aurora-media-player
        commit: 1baa4385a415ab22b1d511dd88ff4fae60883a47
      - cargo-sources.json
